name: Sync Sensor Data from Google Sheets

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest row from Google Sheets
        id: fetch
        run: |
          SHEET_ID="1JAXzFAG-A3xWqFsaElJ4JwyKfBit8_81auWlJ39Z09k"
          ENCODED_SHEET="%E3%82%B7%E3%83%BC%E3%83%881"
          URL="https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${ENCODED_SHEET}"

          curl -L -s -A "Mozilla/5.0" "$URL" -o /tmp/sheet.csv

          LATEST=$(tail -n +2 /tmp/sheet.csv | grep -v '^[,]*$' | tail -1)

          TIMESTAMP=$(echo "$LATEST" | cut -d',' -f1 | tr -d '"' | tr -d '\r')
          CO2=$(echo "$LATEST"       | cut -d',' -f2 | tr -d '"' | tr -d '\r')
          TEMP=$(echo "$LATEST"      | cut -d',' -f3 | tr -d '"' | tr -d '\r')
          HUMIDITY=$(echo "$LATEST"  | cut -d',' -f4 | tr -d '"' | tr -d '\r')
          UPDATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "co2=$CO2"             >> $GITHUB_OUTPUT
          echo "temperature=$TEMP"    >> $GITHUB_OUTPUT
          echo "humidity=$HUMIDITY"   >> $GITHUB_OUTPUT
          echo "updatedAt=$UPDATED_AT" >> $GITHUB_OUTPUT

      - name: Update sensor-data.json
        run: |
          cat > blocks/cards/sensor-data.json << JSONEOF
          {
            "timestamp": "${{ steps.fetch.outputs.timestamp }}",
            "co2": ${{ steps.fetch.outputs.co2 }},
            "temperature": ${{ steps.fetch.outputs.temperature }},
            "humidity": ${{ steps.fetch.outputs.humidity }},
            "updatedAt": "${{ steps.fetch.outputs.updatedAt }}"
          }
          JSONEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocks/cards/sensor-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update sensor data $(date -u +"%Y-%m-%d %H:%M") UTC"
            git push origin HEAD:main
          fi