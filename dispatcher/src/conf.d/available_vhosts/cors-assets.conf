<IfModule mod_headers.c>
  <LocationMatch "^/adobe/assets/.*">
    Header always set Access-Control-Allow-Origin "https://claude.ai"
    Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
    Header always set Access-Control-Allow-Headers "Origin, Accept, X-Requested-With"
    Header always set Access-Control-Max-Age "1800"
  </LocationMatch>
</IfModule>
